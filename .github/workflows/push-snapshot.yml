name: Push snapshot

# Keeps the app fresh: rebuilds the prediction snapshot (ratings + live
# fixtures/scores + news) and pushes it to Supabase on a schedule. The app's
# 60s auto-refresh then picks up the new data automatically.

on:
  schedule:
    # Every 5 minutes (GitHub's minimum) to keep live scores as fresh as the
    # data sources allow. GitHub may still delay runs a little under load.
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # adds a manual "Run workflow" button

# A newer run supersedes an older still-running one, so a slow/stale run can't
# finish late and overwrite fresher data.
concurrency:
  group: push-snapshot
  cancel-in-progress: true

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          # no pip cache: avoids ever installing a stale cached build of the package

      - name: Install dependencies
        run: pip install pandas numpy scipy requests python-dotenv scikit-learn nba_api

      - name: Show what commit we're running
        run: git rev-parse --short HEAD

      - name: Build & push snapshot (from the fresh checkout, not an installed copy)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          PYTHONPATH: src
        run: python -m sports_model.main push
