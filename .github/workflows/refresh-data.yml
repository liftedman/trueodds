name: Refresh data

# Re-ingests results/fixtures into the database once a day and commits the
# updated data/sports.db (+ crests) back to the repo. The every-5-min "Push
# snapshot" workflow then serves the fresh data. This is what keeps club / NFL /
# international results current without a manual re-ingest.
#
# Note: stats.nba.com blocks cloud IPs, so NBA usually won't refresh here — run
# `ingest-nba` locally when needed. Everything else (football-data.co.uk,
# understat, nflverse, martj42) works fine from CI.

on:
  schedule:
    - cron: "17 5 * * *" # daily, ~05:17 UTC (off-peak)
  workflow_dispatch: {}

concurrency:
  group: refresh-data
  cancel-in-progress: false

permissions:
  contents: write # needed to commit the refreshed DB back

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy scipy requests python-dotenv scikit-learn

      - name: Ingest fresh data (each step tolerant of a single source failing)
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          PYTHONPATH: src
        run: |
          python -m sports_model.main ingest      || true
          python -m sports_model.main ingest-xg   || true
          python -m sports_model.main ingest-intl || true
          python -m sports_model.main ingest-nfl  || true
          python -m sports_model.main ingest-wnba || true
          python -m sports_model.main crests      || true

      - name: Commit refreshed data
        run: |
          git config user.name "trueodds-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/sports.db data/crests.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: daily data refresh [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push
          fi
